<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="300" fill="#0B0F19"/>
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:0.2" />
    </linearGradient>
    <style>
      @keyframes float {
        0% { transform: translateY(0px); opacity: 0.3; }
        50% { transform: translateY(-15px); opacity: 0.6; }
        100% { transform: translateY(0px); opacity: 0.3; }
      }
      @keyframes pulse {
        0% { filter: drop-shadow(0 0 5px #4F46E5); opacity: 0.8; }
        50% { filter: drop-shadow(0 0 25px #9333EA); opacity: 1; }
        100% { filter: drop-shadow(0 0 5px #4F46E5); opacity: 0.8; }
      }
      .particle { animation: float 6s infinite ease-in-out; }
      .p1 { animation-delay: 0s; }
      .p2 { animation-delay: 1.5s; }
      .p3 { animation-delay: 3s; }
      .logo-text { animation: pulse 4s infinite ease-in-out; fill: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: 800; font-size: 84px; }
      .sub-text { fill: #94A3B8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 22px; letter-spacing: 4px; font-weight: 400; }
    </style>
  </defs>
  <circle cx="150" cy="80" r="120" fill="url(#grad1)" class="particle p1"/>
  <circle cx="850" cy="220" r="100" fill="url(#grad1)" class="particle p2"/>
  <circle cx="500" cy="260" r="60" fill="url(#grad1)" class="particle p3"/>
  
  <text x="500" y="150" text-anchor="middle" class="logo-text">MettaByte</text>
  <text x="500" y="200" text-anchor="middle" class="sub-text">INTELLIGENT WEB ENGINEERING STUDIO</text>
</svg>
